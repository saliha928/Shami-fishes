<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shami Fishes Aquarium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--s:#111;--s2:#181818;--s3:#222;--s4:#2a2a2a;
  --pur:#7c3aed;--pur2:#6d28d9;--pl:#a78bfa;--muted:#777;
  --border:rgba(255,255,255,0.07);--borderp:rgba(124,58,237,0.35);
  --red:#ef4444;--gold:#f59e0b;--green:#10b981;--blue:#3b82f6;
  --grad:linear-gradient(135deg,#7c3aed,#4f46e5);
}
html,body{height:100%;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative;background:var(--bg);}
::-webkit-scrollbar{width:2px;} ::-webkit-scrollbar-thumb{background:var(--pur);}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:var(--s);border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{font-size:19px;font-weight:900;line-height:1;}
.brand span{color:var(--pl);}
.brand-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.hbtn{width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:.2s;}
.hbtn:active{background:var(--s3);}
.badge{position:absolute;top:-4px;right:-4px;background:var(--pur);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.admin-pill{padding:6px 12px;background:rgba(124,58,237,0.18);border:1px solid var(--borderp);border-radius:8px;color:var(--pl);font-size:11px;font-weight:700;cursor:pointer;transition:.2s;}
.admin-pill:active{background:var(--pur);color:#fff;}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:72px;}

/* ── SEARCH ── */
.search-wrap{padding:14px 18px 0;display:flex;gap:8px;}
.search-box{flex:1;display:flex;align-items:center;gap:8px;background:var(--s2);border-radius:12px;padding:10px 14px;border:1px solid var(--border);transition:.2s;}
.search-box:focus-within{border-color:var(--pur);}
.search-box input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:13px;font-family:inherit;}
.search-box input::placeholder{color:var(--muted);}

/* ── TABS ── */
.tabs{display:flex;padding:14px 18px 0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;}
.tab.on{color:#fff;border-bottom-color:var(--pl);}

/* ── FISH CARDS (1 per row) ── */
.fish-list{padding:14px 18px;display:flex;flex-direction:column;gap:14px;}
.fish-card{border-radius:20px;overflow:hidden;cursor:pointer;background:var(--s2);border:1px solid var(--border);transition:.25s;}
.fish-card:active{transform:scale(0.98);opacity:.9;}
.fish-img-wrap{position:relative;height:210px;overflow:hidden;}
.fish-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:.3s;}
.fish-card:hover .fish-img-wrap img{transform:scale(1.04);}
.price-badge{position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:10px;padding:5px 11px;display:flex;align-items:baseline;gap:1px;}
.price-badge .sym{color:var(--pl);font-size:13px;font-weight:700;}
.price-badge .main{color:#fff;font-size:24px;font-weight:900;line-height:1;}
.price-badge .cents{color:#fff;font-size:13px;font-weight:600;}
.cart-quick{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
.cart-quick:active{background:var(--pur);transform:scale(1.1);}
.fish-bottom{position:absolute;bottom:0;left:0;right:0;padding:44px 14px 14px;background:linear-gradient(to top,rgba(0,0,0,0.88),transparent);display:flex;align-items:center;justify-content:space-between;}
.fish-name{font-size:18px;font-weight:800;}
.fish-arrow{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:18px;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--s);border-top:1px solid var(--border);display:flex;z-index:100;padding:8px 0 16px;}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;padding:4px 0;position:relative;transition:.2s;}
.nitem .ni{font-size:22px;}
.nitem.on{color:var(--pl);}
.nbadge{position:absolute;top:0;right:calc(50% - 24px);background:var(--pur);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

/* ── PAGE HEADER ── */
.phdr{font-size:22px;font-weight:800;padding:18px 18px 0;}

/* ── OVERLAYS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--s);border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;animation:up .3s ease;}

/* ── PRODUCT SHEET ── */
.prod-img{width:100%;height:280px;object-fit:cover;display:block;}
.prod-back,.prod-fav{position:absolute;top:14px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,0.65);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
.prod-back{left:14px;} .prod-fav{right:14px;}
.prod-body{padding:18px;}
.prod-sub{font-size:12px;color:var(--muted);}
.prod-title{font-size:24px;font-weight:900;margin-top:3px;}
.prod-price-row{display:flex;justify-content:space-between;align-items:flex-start;margin-top:8px;}
.prod-price{display:flex;align-items:baseline;gap:2px;}
.prod-price .sym{color:var(--pl);font-size:15px;font-weight:700;}
.prod-price .big{font-size:34px;font-weight:900;}
.prod-unit{font-size:11px;color:var(--muted);margin-top:2px;}
.prod-rating{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:700;}
.star{color:var(--gold);font-size:16px;}
.sec-ttl{font-size:15px;font-weight:700;margin:18px 0 10px;}
.specs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.spec{background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--border);}
.spec-lbl{font-size:10px;color:var(--muted);}
.spec-val{font-size:12px;font-weight:600;margin-top:2px;}
.similar-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.similar-row::-webkit-scrollbar{display:none;}
.sim-card{flex-shrink:0;width:84px;background:var(--s2);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:.2s;}
.sim-card:hover{border-color:var(--borderp);}
.sim-card img{width:100%;height:58px;object-fit:cover;display:block;}
.sim-info{padding:5px 7px;}
.sim-name{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sim-price{font-size:12px;font-weight:700;}
.add-btn{width:100%;padding:16px 20px;margin-top:18px;background:var(--grad);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.2s;font-family:inherit;}
.add-btn:active{transform:scale(0.98);}

/* ── CART SHEET ── */
.cart-sheet{background:var(--s);border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;padding:20px;animation:up .3s ease;}
.cart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cart-item{display:flex;align-items:center;gap:12px;background:var(--s2);border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid var(--border);}
.cart-img{width:60px;height:60px;border-radius:10px;object-fit:cover;flex-shrink:0;display:block;}
.cart-info{flex:1;}
.cart-name{font-size:14px;font-weight:600;}
.cart-unit-lbl{font-size:11px;color:var(--muted);}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{width:26px;height:26px;border-radius:50%;background:var(--s3);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
.qty-btn:active{background:var(--pur);}
.qty-val{font-size:14px;font-weight:600;min-width:20px;text-align:center;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;transition:.2s;padding:0;}
.del-btn:active{color:var(--red);}
.cart-sum{border-top:1px solid var(--border);padding-top:14px;margin-top:6px;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px;}
.sum-row.total{font-size:17px;font-weight:800;color:#fff;}
.sum-row.total span:last-child{color:var(--pl);}
.checkout-btn{width:100%;padding:16px 20px;margin-top:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.2s;font-family:inherit;}
.checkout-btn:active{transform:scale(0.98);}

/* ── ORDER SHEET ── */
.order-sheet{background:var(--s);border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;padding:20px;animation:up .3s ease;}
.form-row{margin-bottom:13px;}
.form-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;}
.form-inp{width:100%;padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:13px;outline:none;font-family:inherit;transition:.2s;}
.form-inp:focus{border-color:var(--pur);}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pay-opt{padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--s2);cursor:pointer;text-align:center;transition:.2s;}
.pay-opt.sel{border-color:var(--pur);background:rgba(124,58,237,0.12);}
.pay-icon{font-size:22px;margin-bottom:4px;}
.pay-lbl{font-size:11px;font-weight:600;}
.divider{font-size:14px;font-weight:700;margin:18px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.order-sum{background:var(--s2);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid var(--border);}
.osum-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:5px;}
.osum-row.tot{font-size:15px;font-weight:800;color:#fff;margin-top:8px;}
.osum-row.tot span:last-child{color:var(--pl);}
.place-btn{width:100%;padding:16px;background:var(--grad);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;}
.place-btn:active{transform:scale(0.98);}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:50px 20px;color:var(--muted);animation:fadeIn .3s ease;}
.empty .ei{font-size:54px;margin-bottom:14px;}
.empty h3{font-size:17px;font-weight:700;color:#fff;margin-bottom:6px;}

/* ── SUCCESS ── */
.success-wrap{text-align:center;padding:60px 20px;animation:fadeIn .4s ease;}
.success-wrap .si{font-size:64px;margin-bottom:16px;}
.success-wrap h2{font-size:22px;font-weight:800;margin-bottom:6px;}
.success-wrap p{color:var(--muted);}

/* ── ORDERS PAGE ── */
.order-card{background:var(--s2);border-radius:14px;padding:14px;margin:0 18px 12px;border:1px solid var(--border);}
.order-id{font-size:11px;color:var(--muted);margin-bottom:8px;}
.order-imgs{display:flex;gap:6px;margin-bottom:10px;}
.order-img{width:46px;height:46px;border-radius:8px;object-fit:cover;display:block;}
.order-meta{display:flex;justify-content:space-between;align-items:center;}
.order-total{font-size:15px;font-weight:700;}
.order-status{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.s-pending{background:rgba(245,158,11,.15);color:var(--gold);}
.s-processing{background:rgba(124,58,237,.15);color:var(--pl);}
.s-delivered{background:rgba(16,185,129,.15);color:var(--green);}
.s-cancelled{background:rgba(239,68,68,.15);color:var(--red);}
.order-date{font-size:11px;color:var(--muted);margin-top:4px;}

/* ── PROFILE ── */
.prof-wrap{padding:18px 18px 80px;}
.prof-avatar{width:80px;height:80px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;}
.prof-name{text-align:center;font-size:20px;font-weight:800;}
.prof-email{text-align:center;font-size:13px;color:var(--muted);margin-top:4px;}
.prof-sec-ttl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 10px;}
.prof-item{display:flex;align-items:center;gap:14px;background:var(--s2);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);transition:.2s;}
.prof-item:active{border-color:var(--borderp);}

/* ── HOW IT WORKS ── */
.how-wrap{padding:20px 18px 80px;}
.how-step{display:flex;align-items:flex-start;gap:14px;background:var(--s2);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--border);}
.how-icon{width:44px;height:44px;border-radius:12px;background:rgba(124,58,237,.15);border:1px solid var(--borderp);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.how-ttl{font-size:14px;font-weight:700;}
.how-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;}
.trust{display:flex;justify-content:space-around;margin-top:18px;padding:16px 0;border-top:1px solid var(--border);}
.trust-icon{font-size:22px;color:var(--pl);text-align:center;}
.trust-lbl{font-size:10px;color:var(--muted);margin-top:4px;text-align:center;line-height:1.4;}

/* ── CLOSE / BACK BTNS ── */
.close-btn{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;padding:0;}
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--s2);border:none;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ══════════════════════════════
   ── ADMIN PANEL ──
══════════════════════════════ */
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:500;align-items:flex-end;justify-content:center;}
.admin-overlay.open{display:flex;}
.admin-panel{background:var(--s);border-radius:22px 22px 0 0;width:100%;max-width:430px;height:94vh;display:flex;flex-direction:column;animation:up .3s ease;}
.admin-hdr{padding:18px 18px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
.admin-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.admin-title{font-size:20px;font-weight:800;}
.admin-sub{font-size:11px;color:var(--pl);margin-top:2px;}
.admin-tabs{display:flex;gap:6px;padding-bottom:14px;}
.admin-tab{flex:1;padding:9px 4px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:.2s;font-family:inherit;}
.admin-tab.on{background:var(--pur);border-color:var(--pur);color:#fff;}
.admin-body{flex:1;overflow-y:auto;padding:14px 16px 20px;}

/* admin items list */
.admin-fish-item{background:var(--s2);border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid var(--border);transition:.2s;}
.admin-fish-item:hover{border-color:var(--borderp);}
.admin-fish-row{display:flex;align-items:center;gap:12px;}
.admin-fish-img{width:54px;height:54px;border-radius:8px;object-fit:cover;flex-shrink:0;display:block;}
.admin-fish-info{flex:1;}
.admin-fish-name{font-size:13px;font-weight:600;}
.admin-fish-cat{font-size:11px;color:var(--muted);margin-top:1px;}
.admin-fish-price{font-size:14px;font-weight:800;color:var(--pl);margin-top:2px;}
.admin-actions{display:flex;gap:6px;flex-shrink:0;}
.a-btn{width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.a-edit{background:rgba(124,58,237,.2);color:var(--pl);}
.a-edit:active{background:var(--pur);color:#fff;}
.a-del{background:rgba(239,68,68,.15);color:var(--red);}
.a-del:active{background:var(--red);color:#fff;}
.a-toggle{background:rgba(16,185,129,.15);color:var(--green);}
.a-toggle:active{background:var(--green);color:#fff;}

/* inline edit form */
.edit-form{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);animation:fadeIn .2s ease;}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.edit-field label{font-size:10px;color:var(--muted);font-weight:600;display:block;margin-bottom:3px;}
.edit-inp{width:100%;padding:8px 10px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:12px;outline:none;font-family:inherit;transition:.2s;}
.edit-inp:focus{border-color:var(--pur);}
.edit-sel{width:100%;padding:8px 10px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:12px;outline:none;font-family:inherit;appearance:none;}
.edit-actions{display:flex;gap:8px;margin-top:10px;}
.save-btn{flex:1;padding:10px;background:var(--pur);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;transition:.2s;}
.save-btn:active{background:var(--pur2);}
.cancel-btn{padding:10px 14px;background:var(--s3);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;}

/* add fish form */
.add-form-wrap{background:var(--s2);border-radius:14px;padding:16px;border:1px solid var(--border);}
.add-form-ttl{font-size:15px;font-weight:700;margin-bottom:14px;}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.add-field label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;}
.add-inp{width:100%;padding:10px 12px;background:var(--s3);border:1px solid var(--border);border-radius:9px;color:#fff;font-size:13px;outline:none;font-family:inherit;transition:.2s;}
.add-inp:focus{border-color:var(--pur);}
.add-sel{width:100%;padding:10px 12px;background:var(--s3);border:1px solid var(--border);border-radius:9px;color:#fff;font-size:13px;outline:none;font-family:inherit;appearance:none;}
.img-preview{width:100%;height:90px;border-radius:10px;object-fit:cover;display:block;margin-top:8px;border:1px solid var(--border);}
.add-fish-btn{width:100%;padding:14px;background:var(--grad);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit;transition:.2s;}
.add-fish-btn:active{transform:scale(0.98);}

/* orders admin */
.admin-order-card{background:var(--s2);border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid var(--border);}
.admin-order-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.admin-order-id{font-size:13px;font-weight:700;}
.status-sel{background:var(--s3);border:1px solid var(--border);border-radius:6px;color:#fff;font-size:11px;padding:4px 8px;font-family:inherit;outline:none;cursor:pointer;}
.admin-order-imgs{display:flex;gap:6px;margin-bottom:8px;}
.admin-order-img{width:40px;height:40px;border-radius:6px;object-fit:cover;display:block;}
.admin-order-footer{display:flex;justify-c
